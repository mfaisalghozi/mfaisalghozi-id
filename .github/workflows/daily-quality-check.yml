name: Daily Quality Check

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC every day
  workflow_dispatch: # allow manual runs

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        # continue so the rest of the checks still run; the summary will show the issues
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm build
        env:
          # Notion keys are optional; without them the build uses sample data
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROJECTS_DATABASE_ID: ${{ secrets.NOTION_PROJECTS_DATABASE_ID }}

      - name: Report bundle sizes
        run: |
          echo "### Build output sizes" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -h | tail -20 >> $GITHUB_STEP_SUMMARY || true

  performance:
    name: Performance Hints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for large static assets
        run: |
          echo "### Large files (>100 KB) in public/" >> $GITHUB_STEP_SUMMARY
          find public -type f -size +100k -exec du -sh {} \; 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "None found." >> $GITHUB_STEP_SUMMARY

      - name: Check for missing next/image usage
        run: |
          echo "### Raw <img> tags (should use next/image)" >> $GITHUB_STEP_SUMMARY
          grep -rn '<img ' app/ components/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "None found — good." >> $GITHUB_STEP_SUMMARY

      - name: Check Notion revalidation window
        run: |
          echo "### ISR revalidation windows" >> $GITHUB_STEP_SUMMARY
          grep -rn 'revalidate' app/ lib/ --include="*.ts" --include="*.tsx" >> $GITHUB_STEP_SUMMARY || true

      - name: Check for console.log left in source
        run: |
          echo "### console.log in source (potential perf/security leak)" >> $GITHUB_STEP_SUMMARY
          grep -rn 'console\.log' app/ lib/ components/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "None found — good." >> $GITHUB_STEP_SUMMARY

      - name: Check for unvalidated external URLs used as href
        run: |
          echo "### Unvalidated external URL hrefs (should use isSafeUrl guard)" >> $GITHUB_STEP_SUMMARY
          # Flag any href={...Url} patterns not wrapped in isSafeUrl()
          if grep -rn 'href={[^}]*Url}' app/ components/ 2>/dev/null | grep -v 'isSafeUrl'; then
            echo "WARNING: Found potentially unvalidated URL hrefs above." >> $GITHUB_STEP_SUMMARY
          else
            echo "None found — good." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check CSP for unsafe-inline in script-src
        run: |
          echo "### CSP unsafe-inline check" >> $GITHUB_STEP_SUMMARY
          if grep -n "'unsafe-inline'" next.config.ts 2>/dev/null | grep 'script-src'; then
            echo "WARNING: script-src contains 'unsafe-inline' — consider nonce-based CSP." >> $GITHUB_STEP_SUMMARY
          else
            echo "No unsafe-inline in script-src — good." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for missing rel=noopener on target=_blank links
        run: |
          echo "### target=_blank without rel=noopener noreferrer" >> $GITHUB_STEP_SUMMARY
          grep -rn 'target="_blank"' app/ components/ 2>/dev/null | grep -v 'noopener' >> $GITHUB_STEP_SUMMARY || echo "All _blank links have noopener — good." >> $GITHUB_STEP_SUMMARY
